spring.application.name=autenticacion-servicio-test

spring.datasource.url=jdbc:h2:mem:auth_test_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=false

jwt.secret=FoodFastClaveJWTUltraSegura2026ParaMicroserviciosConMasDe42Caracteres
jwt.expiration=86400000

logging.level.org.hibernate.SQL=DEBUG