server:
  port: ${PORT:${SERVER_PORT:8086}}
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  application:
    name: pago-servicio

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pago_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

services:
  pedido:
    enabled: ${PEDIDO_INTEGRATION_ENABLED:false}
    url: ${PEDIDO_SERVICE_URL:http://localhost:8083}

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  rest-client:
    timeout-seconds: ${REST_CLIENT_TIMEOUT_SECONDS:5}

jwt:
  secret: ${JWT_SECRET:FoodFastDefinitivo2026Secret}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
      cors:
        allowed-origin-patterns: "*"
        allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
        allowed-headers: "*"

logging:
  level:
    com.foodfast.pago_servicio: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true