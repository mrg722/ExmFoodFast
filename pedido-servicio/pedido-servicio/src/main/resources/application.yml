server:
  port: ${PORT:${SERVER_PORT:8083}}
spring:
  application:
    name: pedido-servicio

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pedido_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

services:
  inventario:
    url: ${INVENTARIO_SERVICE_URL:http://localhost:8082}

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:true}
  webclient:
    timeout-seconds: ${WEBCLIENT_TIMEOUT_SECONDS:5}

jwt:
  secret: ${JWT_SECRET:FoodFastDefinitivo2026Secret}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.foodfast.pedido_servicio: INFO
    org.springframework.web.reactive.function.client: INFO

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true