    environment:
      <<: *common-java-env
      SPRING_APPLICATION_NAME: restaurante-servicio
      SERVER_PORT: 8087
      PORT: 8087
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-foodfast:3306/restaurante_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: 1234
      DB_HOST: mysql-foodfast
      DB_PORT: 3306
      DB_NAME: restaurante_db
      DB_USER: appuser
      DB_PASSWORD: 1234
      NOTIFICACION_SERVICE_URL: http://notificacion-servicio:8089
      NOTIFICACION_INTEGRATION_ENABLED: "false"
    depends_on:
