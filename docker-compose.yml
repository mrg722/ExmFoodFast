  resena-servicio:
    build:
      context: ./resena-servicio/resena-servicio
    container_name: foodfast-resena-servicio
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      <<: *common-java-env
      SPRING_APPLICATION_NAME: resena-servicio
      SERVER_PORT: 8088
      PORT: 8088
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-foodfast:3306/resena_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: 1234
      DB_HOST: mysql-foodfast
      DB_PORT: 3306
      DB_NAME: resena_db
      DB_USER: appuser
      DB_PASSWORD: 1234
      CATALOGO_SERVICE_URL: http://catalogo-servicio:8081
      PEDIDO_SERVICE_URL: http://pedido-servicio:8083
      RESTAURANTE_SERVICE_URL: http://restaurante-servicio:8087
      CATALOGO_INTEGRATION_ENABLED: "false"
    depends_on:
