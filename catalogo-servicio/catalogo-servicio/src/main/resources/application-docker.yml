spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://${DB_HOST:catalogo-db}:${DB_PORT:3306}/${DB_NAME:catalogo_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
  webclient:
    timeout-seconds: ${WEBCLIENT_TIMEOUT_SECONDS:5}

services:
  inventario:
    enabled: ${INVENTARIO_INTEGRATION_ENABLED:false}
    url: ${INVENTARIO_SERVICE_URL:http://inventario-servicio:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true