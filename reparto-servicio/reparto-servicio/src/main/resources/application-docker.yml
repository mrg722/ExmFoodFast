server:
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://${DB_HOST:reparto-db}:${DB_PORT:3306}/${DB_NAME:reparto_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

services:
  pedido:
    enabled: ${PEDIDO_INTEGRATION_ENABLED:false}
    url: ${PEDIDO_SERVICE_URL:http://pedido-servicio:8083}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true